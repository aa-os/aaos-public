name: M14 AI PR Provenance And Reviewer Routing

# pull_request_target is used only because this workflow executes the trusted
# base-branch workflow definition and never checks out or executes pull-request code.
on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: m14-ai-pr-provenance-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  provenance:
    runs-on: ubuntu-latest
    outputs:
      is-agent-pr: ${{ steps.provenance.outputs.is-agent-pr }}
      agent: ${{ steps.provenance.outputs.agent }}
      detection-signals: ${{ steps.provenance.outputs.detection-signals }}
      sensitive-change: ${{ steps.provenance.outputs.sensitive-change }}
      review-routing-required: ${{ steps.provenance.outputs.review-routing-required }}
      reviewer-request-status: ${{ steps.provenance.outputs.reviewer-request-status }}

    steps:
      - name: Detect provenance and route review
        id: provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AAOS_AI_PR_REVIEWERS: ${{ vars.AAOS_AI_PR_REVIEWERS }}
          AAOS_AI_PR_REVIEW_TEAMS: ${{ vars.AAOS_AI_PR_REVIEW_TEAMS }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request


          MARKER = "<!-- aaos:m14-ai-pr-provenance -->"
          LABELS = {
              "pr-by-ai": {
                  "color": "8250df",
                  "description": "Heuristic AI or agent PR provenance; not approval",
              },
              "human-review-required": {
                  "color": "d93f0b",
                  "description": "Advisory human-review routing; not completed review",
              },
          }
          AGENT_DISPLAY = {
              "codex": "Codex",
              "claude_code": "Claude Code",
              "github_copilot": "GitHub Copilot",
              "cursor": "Cursor",
              "devin": "Devin",
              "google_jules": "Google Jules",
              "aider": "Aider",
              "openhands": "OpenHands",
              "sweep": "Sweep",
              "unknown": "unknown",
          }
          AGENT_TOKENS = {
              "codex": ("codex",),
              "claude_code": ("claude-code", "claude_code", "claude code", "claude"),
              "github_copilot": ("github-copilot", "github_copilot", "github copilot", "copilot"),
              "cursor": ("cursor",),
              "devin": ("devin",),
              "google_jules": ("google-jules", "google_jules", "google jules", "jules"),
              "aider": ("aider",),
              "openhands": ("openhands", "open-hands", "open hands"),
              "sweep": ("sweep",),
          }
          BRANCH_PREFIXES = {
              "codex": "codex/",
              "claude_code": "claude/",
              "github_copilot": "copilot/",
              "cursor": "cursor/",
              "devin": "devin/",
              "google_jules": "jules/",
              "aider": "aider/",
              "openhands": "openhands/",
              "sweep": "sweep/",
          }
          GENERATION_MARKERS = {
              "codex": ("generated by codex", "generated with codex"),
              "claude_code": ("generated by claude code", "generated with claude code"),
              "github_copilot": ("generated by github copilot", "generated with github copilot"),
              "cursor": ("generated by cursor", "generated with cursor"),
              "devin": ("generated by devin", "generated with devin"),
              "google_jules": ("generated by google jules", "generated with google jules"),
              "aider": ("generated by aider", "generated with aider"),
              "openhands": ("generated by openhands", "generated with openhands"),
              "sweep": ("generated by sweep", "generated with sweep"),
          }
          BOUNDARIES = (
              "AI-authored detection is provenance evidence, not identity proof.",
              "pr-by-ai is not approval.",
              "human-review-required is not completed review.",
              "Reviewer routing is not review approval.",
              "Workflow success is not merge approval.",
              "This workflow is not a security scanner.",
              "This workflow is not a policy authority.",
              "This workflow is not a Decision Proof verification or sealing engine.",
              "Decision Proof sealing remains AAOS-owned.",
              "AAOS remains the decision sovereignty layer.",
          )


          class ApiError(Exception):
              def __init__(self, status):
                  super().__init__(f"github_api_status_{status}")
                  self.status = status


          def warning(code):
              safe_code = re.sub(r"[^a-zA-Z0-9_.:-]+", "_", str(code))[:160]
              print(f"::warning::{safe_code}")


          def write_outputs(values):
              output_path = os.environ.get("GITHUB_OUTPUT")
              if not output_path:
                  return
              with open(output_path, "a", encoding="utf-8") as handle:
                  for key, value in values.items():
                      handle.write(f"{key}={value}\n")


          def api_request(method, path, payload=None):
              base_url = os.environ.get("GITHUB_API_URL", "https://api.github.com").rstrip("/")
              token = os.environ.get("GITHUB_TOKEN", "")
              data = None
              headers = {
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "aaos-m14-ai-pr-provenance",
              }
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              if payload is not None:
                  data = json.dumps(payload, separators=(",", ":")).encode("utf-8")
                  headers["Content-Type"] = "application/json"
              request = urllib.request.Request(
                  f"{base_url}{path}", data=data, headers=headers, method=method
              )
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      raw = response.read()
                      return json.loads(raw.decode("utf-8")) if raw else None
              except urllib.error.HTTPError as exc:
                  raise ApiError(exc.code) from None
              except (urllib.error.URLError, TimeoutError):
                  raise ApiError("network") from None


          def read_list(path, warning_code):
              records = []
              for page in range(1, 101):
                  separator = "&" if "?" in path else "?"
                  try:
                      batch = api_request(
                          "GET", f"{path}{separator}per_page=100&page={page}"
                      )
                  except ApiError:
                      warning(warning_code)
                      return records, False
                  if not isinstance(batch, list):
                      warning(warning_code)
                      return records, False
                  records.extend(batch)
                  if len(batch) < 100:
                      return records, True
              warning(f"{warning_code}_pagination_limit")
              return records, False


          def mutate(method, path, payload, warning_code):
              try:
                  return api_request(method, path, payload), True
              except ApiError:
                  warning(warning_code)
                  return None, False


          def ensure_label(repo_path, label_name):
              definition = LABELS[label_name]
              encoded = urllib.parse.quote(label_name, safe="")
              try:
                  existing = api_request("GET", f"{repo_path}/labels/{encoded}")
              except ApiError as exc:
                  if exc.status != 404:
                      warning(f"ensure_label_{label_name}_read_failed")
                      return False
                  _, created = mutate(
                      "POST",
                      f"{repo_path}/labels",
                      {"name": label_name, **definition},
                      f"ensure_label_{label_name}_create_failed",
                  )
                  return created
              if not isinstance(existing, dict):
                  warning(f"ensure_label_{label_name}_invalid_response")
                  return False
              color_matches = str(existing.get("color", "")).lower() == definition["color"]
              description_matches = existing.get("description") == definition["description"]
              if color_matches and description_matches:
                  return True
              _, updated = mutate(
                  "PATCH",
                  f"{repo_path}/labels/{encoded}",
                  definition,
                  f"ensure_label_{label_name}_update_failed",
              )
              return updated


          def apply_label(repo_path, number, label_name):
              if not ensure_label(repo_path, label_name):
                  return "warning"
              _, applied = mutate(
                  "POST",
                  f"{repo_path}/issues/{number}/labels",
                  {"labels": [label_name]},
                  f"apply_label_{label_name}_failed",
              )
              return "applied" if applied else "warning"


          def csv_values(value):
              return sorted(
                  {
                      item.strip().lstrip("@")
                      for item in str(value or "").split(",")
                      if item.strip().lstrip("@")
                  },
                  key=str.casefold,
              )


          def safe_markdown(value, limit=240):
              text = re.sub(r"[\r\n\t]+", " ", str(value or ""))[:limit]
              return (
                  text.replace("&", "&amp;")
                  .replace("<", "&lt;")
                  .replace(">", "&gt;")
                  .replace("`", "'")
              )


          def sensitive_path(path):
              normalized = str(path or "").replace("\\", "/").lstrip("./")
              lowered = normalized.casefold()
              basename = lowered.rsplit("/", 1)[-1]
              if lowered.startswith(
                  (
                      ".github/workflows/",
                      "runtime/",
                      "tests/",
                      "docs/public-integration-pack/",
                      "examples/public-integration-pack-pilot/",
                      "release/",
                      "releases/",
                  )
              ):
                  return True
              if basename in {"readme.md", "security.md", "codeowners"}:
                  return True
              return (
                  basename.startswith("changelog")
                  or basename.startswith("release-")
                  or basename.endswith(".release.json")
                  or "/release/" in lowered
                  or "/releases/" in lowered
              )


          def detect_agent(pr, commit_messages):
              signals = []
              candidates = []
              author = str((pr.get("user") or {}).get("login") or "").casefold()
              branch = str((pr.get("head") or {}).get("ref") or "").casefold()
              title = str(pr.get("title") or "")
              body = str(pr.get("body") or "")
              labels = {
                  str(item.get("name") or "").casefold()
                  for item in pr.get("labels") or []
                  if isinstance(item, dict)
              }

              for agent, tokens in AGENT_TOKENS.items():
                  if any(token in author for token in tokens):
                      signals.append(f"author:{agent}")
                      candidates.append(agent)
              for agent, prefix in BRANCH_PREFIXES.items():
                  if branch.startswith(prefix):
                      signals.append(f"branch_prefix:{prefix}")
                      candidates.append(agent)

              combined_pr_text = f"{title}\n{body}".casefold()
              if re.search(r"(?im)^\s*(ai-authored|agent-authored)\s*:\s*true\s*$", combined_pr_text):
                  signals.append("structured_marker:agent_authored_true")
              for agent, markers in GENERATION_MARKERS.items():
                  if any(marker in combined_pr_text for marker in markers):
                      signals.append(f"pr_marker:{agent}")
                      candidates.append(agent)

              for message in commit_messages:
                  lowered = str(message or "").casefold()
                  if re.search(r"(?im)^\s*(ai-authored|agent-authored)\s*:\s*true\s*$", lowered):
                      signals.append("commit_marker:agent_authored_true")
                  for agent, markers in GENERATION_MARKERS.items():
                      if any(marker in lowered for marker in markers):
                          signals.append(f"commit_marker:{agent}")
                          candidates.append(agent)
                  for agent, tokens in AGENT_TOKENS.items():
                      coauthor_lines = re.findall(r"(?im)^\s*co-authored-by\s*:\s*(.+)$", lowered)
                      if any(any(token in line for token in tokens) for line in coauthor_lines):
                          signals.append(f"coauthor:{agent}")
                          candidates.append(agent)

              if "pr-by-ai" in labels:
                  signals.append("label:pr-by-ai")

              ordered_signals = list(dict.fromkeys(signals))
              detected = bool(ordered_signals)
              agent = candidates[0] if candidates else "unknown"
              return detected, agent, ordered_signals


          def top_areas(files):
              counts = {}
              for item in files:
                  path = str(item.get("filename") or "") if isinstance(item, dict) else ""
                  area = path.split("/", 1)[0] if "/" in path else path
                  area = safe_markdown(area or "repository-root", 80)
                  counts[area] = counts.get(area, 0) + 1
              return [
                  f"{area} ({count})"
                  for area, count in sorted(counts.items(), key=lambda pair: (-pair[1], pair[0]))[:5]
              ]


          def build_comment(pr, agent, signals, files, sensitive_files, label_state, review_label_state, reviewer_status):
              changed_count = int(pr.get("changed_files") or len(files))
              additions = int(pr.get("additions") or 0)
              deletions = int(pr.get("deletions") or 0)
              areas = top_areas(files)
              run_id = safe_markdown(os.environ.get("GITHUB_RUN_ID", "unknown"), 80)
              run_attempt = safe_markdown(os.environ.get("GITHUB_RUN_ATTEMPT", "1"), 20)
              signal_text = ", ".join(f"`{safe_markdown(item, 120)}`" for item in signals) or "none"
              area_text = ", ".join(f"`{item}`" for item in areas) or "none"
              sensitive_text = (
                  "\n".join(f"  - `{safe_markdown(path, 240)}`" for path in sensitive_files[:50])
                  if sensitive_files
                  else "  - none"
              )
              boundary_text = "\n".join(f"- {statement}" for statement in BOUNDARIES)
              return f"""{MARKER}
          ## M14 AI-authored PR provenance summary

          - Detected agent: `{safe_markdown(AGENT_DISPLAY.get(agent, "unknown"), 80)}`
          - Detection signals: {signal_text}
          - Detection basis: heuristic metadata evidence only
          - Files changed: `{changed_count}`
          - Additions: `{additions}`
          - Deletions: `{deletions}`
          - Top changed path areas: {area_text}
          - Governance-sensitive changed files:
          {sensitive_text}
          - Provenance label state: `{label_state}`
          - Human-review routing state: `{review_label_state}`
          - Reviewer request state: `{reviewer_status}`
          - Workflow run identifier: `{run_id}:{run_attempt}`

          ### Governance boundary

          {boundary_text}
          """


          def upsert_comment(repo_path, number, body):
              comments, complete = read_list(
                  f"{repo_path}/issues/{number}/comments", "provenance_comment_read_failed"
              )
              if not complete:
                  return "warning"
              existing = [
                  comment
                  for comment in comments
                  if isinstance(comment, dict) and MARKER in str(comment.get("body") or "")
              ]
              if existing:
                  comment_id = existing[0].get("id")
                  if not comment_id:
                      warning("provenance_comment_missing_id")
                      return "warning"
                  _, updated = mutate(
                      "PATCH",
                      f"{repo_path}/issues/comments/{comment_id}",
                      {"body": body},
                      "provenance_comment_update_failed",
                  )
                  return "updated" if updated else "warning"
              _, created = mutate(
                  "POST",
                  f"{repo_path}/issues/{number}/comments",
                  {"body": body},
                  "provenance_comment_create_failed",
              )
              return "created" if created else "warning"


          def main():
              outputs = {
                  "is-agent-pr": "false",
                  "agent": "unknown",
                  "detection-signals": "[]",
                  "sensitive-change": "false",
                  "review-routing-required": "false",
                  "reviewer-request-status": "not_required",
              }
              try:
                  event_path = os.environ.get("GITHUB_EVENT_PATH", "")
                  with open(event_path, encoding="utf-8") as handle:
                      event = json.load(handle)
                  pr = event.get("pull_request") or {}
                  repository = event.get("repository") or {}
                  full_name = str(repository.get("full_name") or "")
                  number = int(pr.get("number") or event.get("number") or 0)
                  if not re.fullmatch(r"[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+", full_name) or number <= 0:
                      warning("invalid_event_repository_or_pull_request")
                      write_outputs(outputs)
                      return
                  repo_path = f"/repos/{full_name}"

                  commits, _ = read_list(
                      f"{repo_path}/pulls/{number}/commits", "pull_request_commit_read_failed"
                  )
                  commit_messages = [
                      ((item.get("commit") or {}).get("message") or "")
                      for item in commits
                      if isinstance(item, dict)
                  ]
                  detected, agent, signals = detect_agent(pr, commit_messages)
                  outputs["is-agent-pr"] = "true" if detected else "false"
                  outputs["agent"] = agent if detected else "unknown"
                  outputs["detection-signals"] = json.dumps(
                      signals, ensure_ascii=True, separators=(",", ":")
                  )
                  if not detected:
                      write_outputs(outputs)
                      return

                  files, file_list_complete = read_list(
                      f"{repo_path}/pulls/{number}/files", "pull_request_file_read_failed"
                  )
                  filenames = [
                      str(item.get("filename") or "")
                      for item in files
                      if isinstance(item, dict) and item.get("filename")
                  ]
                  sensitive_files = sorted(path for path in filenames if sensitive_path(path))
                  if file_list_complete:
                      sensitive = bool(sensitive_files)
                  else:
                      sensitive = True
                      sensitive_files = [
                          "file-list-unavailable; conservative human review required"
                      ]
                  outputs["sensitive-change"] = "true" if sensitive else "false"
                  outputs["review-routing-required"] = "true" if sensitive else "false"

                  label_state = apply_label(repo_path, number, "pr-by-ai")
                  review_label_state = "not_required"
                  reviewer_status = "not_required"
                  if sensitive:
                      review_label_state = apply_label(
                          repo_path, number, "human-review-required"
                      )
                      author = str((pr.get("user") or {}).get("login") or "")
                      reviewers = [
                          reviewer
                          for reviewer in csv_values(os.environ.get("AAOS_AI_PR_REVIEWERS"))
                          if reviewer.casefold() != author.casefold()
                      ]
                      teams = csv_values(os.environ.get("AAOS_AI_PR_REVIEW_TEAMS"))
                      if not reviewers and not teams:
                          reviewer_status = "reviewer_routing_not_configured"
                      else:
                          _, requested = mutate(
                              "POST",
                              f"{repo_path}/pulls/{number}/requested_reviewers",
                              {"reviewers": reviewers, "team_reviewers": teams},
                              "reviewer_request_failed",
                          )
                          reviewer_status = (
                              "reviewer_request_succeeded"
                              if requested
                              else "reviewer_request_warning"
                          )
                  outputs["reviewer-request-status"] = reviewer_status

                  comment = build_comment(
                      pr,
                      agent,
                      signals,
                      files,
                      sensitive_files,
                      label_state,
                      review_label_state,
                      reviewer_status,
                  )
                  upsert_comment(repo_path, number, comment)
                  write_outputs(outputs)
              except Exception:
                  warning("provenance_workflow_non_blocking_error")
                  write_outputs(outputs)


          main()
          sys.exit(0)
          PY
